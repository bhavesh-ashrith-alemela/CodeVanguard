{% extends "base.html" %}

{% block title %}CodeVanguard – Admin Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 animate-slide-up space-y-6">
    
    <!-- Title Area -->
    <div class="text-center space-y-2">
        <span class="p-3 bg-primary/10 rounded-2xl text-primary inline-block border-4 border-slate-900 shadow-[2px_2px_0px_#0f172a] mb-2">
            <i data-lucide="lock" class="w-8 h-8"></i>
        </span>
        <h2 class="text-2xl font-black text-slate-800 uppercase tracking-wide">Admin Access</h2>
        <p class="text-xs text-slate-400 font-bold">Authorized security officers only. Log in to manage scan records and view audit logs.</p>
    </div>

    <!-- Login Card -->
    <div class="cartoon-card bg-white p-8">
        
        {% if error %}
        <div class="alert alert-error border-4 border-slate-900 rounded-xl p-3 shadow-[2px_2px_0px_#0f172a] mb-6 flex items-start gap-2 bg-red-100 text-slate-900 text-xs font-bold">
            <i data-lucide="alert-octagon" class="w-4 h-4 text-error flex-shrink-0 mt-0.5"></i>
            <div>
                <span class="font-extrabold uppercase text-[10px] tracking-wider text-error block mb-0.5">Access Blocked</span>
                {{ error }}
            </div>
        </div>
        {% endif %}

        <form action="/admin/login" method="POST" class="space-y-6">
            <div class="form-control space-y-1">
                <label class="label pb-0">
                    <span class="label-text font-black text-slate-700 text-xs uppercase tracking-wider">Username</span>
                </label>
                <input type="text" name="username" required placeholder="admin" autocomplete="username" class="cartoon-input input input-bordered w-full text-slate-800 text-xs py-2 px-3 focus:outline-none" />
            </div>

            <div class="form-control space-y-1">
                <label class="label pb-0">
                    <span class="label-text font-black text-slate-700 text-xs uppercase tracking-wider">Password</span>
                </label>
                <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password" class="cartoon-input input input-bordered w-full text-slate-800 text-xs py-2 px-3 focus:outline-none" />
            </div>

            <div class="pt-4">
                <button type="submit" class="cartoon-btn btn-md w-full py-2.5 rounded-xl text-xs font-black flex items-center justify-center gap-1.5 text-white">
                    <i data-lucide="shield-check" class="w-4 h-4"></i> Authenticate
                </button>
            </div>
        </form>
    </div>

    <div class="text-center">
        <a href="/" class="text-xs text-slate-400 font-bold hover:text-slate-600 transition-colors inline-flex items-center gap-1">
            <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Return to Scan Dashboard
        </a>
    </div>

</div>
{% endblock %}
