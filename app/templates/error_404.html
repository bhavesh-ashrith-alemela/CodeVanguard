{% extends "base.html" %}

{% block title %}CodeVanguard – Page Not Found{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center space-y-6 py-12 animate-slide-up">
    <div class="space-y-4">
        <span class="p-4 bg-primary/10 rounded-full text-primary inline-block">
            <i data-lucide="compass" class="w-16 h-16 animate-spin" style="animation-duration: 6s;"></i>
        </span>
        <h2 class="text-4xl font-extrabold text-white">404</h2>
        <h3 class="text-xl font-bold text-white/80">Page Not Found</h3>
        <p class="text-xs text-base-content/60 leading-relaxed">
            The page you are looking for does not exist or has been moved. Use the navigation links above to find your way back.
        </p>
    </div>
    
    <div>
        <a href="/" class="btn btn-primary rounded-xl font-bold gap-2 shadow-lg shadow-primary/10">
            <i data-lucide="home" class="w-4 h-4"></i> Back to Safety
        </a>
    </div>
</div>
{% endblock %}
